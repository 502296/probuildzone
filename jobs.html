<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Available Jobs - ProBuildZone</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .job {
      background: white;
      padding: 15px;
      margin: 10px auto;
      border-radius: 10px;
      max-width: 600px;
      box-shadow: 0 0 10px rgba(0,0,0,0.05);
    }

    .job h3 {
      margin: 0 0 10px;
    }

    .job button {
      background: gold;
      border: none;
      padding: 10px;
      cursor: pointer;
      border-radius: 6px;
    }
  </style>
</head>
<body>

<h1>Available Jobs</h1>

<div id="jobs"></div>

<script>
  // 🔑 بيانات Supabase
  const SUPABASE_URL = "YOUR_SUPABASE_URL";
  const SUPABASE_KEY = "YOUR_SUPABASE_ANON_KEY";

  const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // 📥 قراءة القيم من الرابط
  const params = new URLSearchParams(window.location.search);
  const category = params.get("category");
  const city = params.get("city");
  const state = params.get("state");

  async function loadJobs() {
    let query = supabase
      .from("homeowner_jobs")
      .select("*")
      .order("id", { ascending: false });

    if (category) query = query.eq("category", category);
    if (city) query = query.eq("city", city);
    if (state) query = query.eq("state", state);

    const { data, error } = await query;

    if (error) {
      console.error(error);
      return;
    }

    const container = document.getElementById("jobs");

    if (!data.length) {
      container.innerHTML = "<p style='text-align:center'>No jobs found</p>";
      return;
    }

    data.forEach(job => {
      const div = document.createElement("div");
      div.className = "job";

      div.innerHTML = `
        <h3>${job.title || "No title"}</h3>
        <p><strong>Category:</strong> ${job.category || "-"}</p>
        <p><strong>City:</strong> ${job.city || "-"}</p>
        <button onclick="viewJob('${job.id}')">View Details</button>
      `;

      container.appendChild(div);
    });
  }

  function viewJob(id) {
    window.location.href = `/job.html?id=${id}`;
  }

  loadJobs();
</script>

</body>
</html>
