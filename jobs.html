<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Available Jobs - ProBuildZone</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --pbz:#0F2A43;
      --gold:#D4AF37;
      --muted:#617186;
      --bg:#f3f5f7;
      --card:#ffffff;
      --border:#e3e7eb;
      --danger:#b42318;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Inter, Arial, sans-serif;
      background:var(--bg);
      color:var(--pbz);
      padding:28px 16px 40px;
    }

    .page{
      max-width:1100px;
      margin:0 auto;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:22px;
    }

    .topbar-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    h1{
      margin:0;
      font-size:30px;
    }

    .subtitle{
      color:var(--muted);
      margin-top:8px;
      margin-bottom:0;
      line-height:1.5;
      max-width:720px;
    }

    .filters{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:22px;
    }

    .pill{
      background:#fff;
      border:1px solid var(--border);
      border-radius:999px;
      padding:8px 14px;
      font-size:14px;
      color:var(--pbz);
    }

    .jobs-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(320px, 1fr));
      gap:16px;
    }

    .job-card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:16px;
      padding:18px;
      box-shadow:0 6px 18px rgba(0,0,0,.04);
      display:flex;
      flex-direction:column;
      min-height:100%;
    }

    .job-title{
      margin:0 0 10px;
      font-size:20px;
      line-height:1.35;
    }

    .meta{
      color:var(--muted);
      font-size:14px;
      margin-bottom:12px;
      line-height:1.6;
    }

    .meta div{
      margin-bottom:4px;
    }

    .desc{
      font-size:15px;
      line-height:1.65;
      margin-bottom:16px;
      color:#24384d;
      flex:1;
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:auto;
    }

    .btn{
      display:inline-block;
      text-decoration:none;
      border:none;
      cursor:pointer;
      font-weight:600;
      border-radius:10px;
      padding:10px 14px;
      font-family:inherit;
      transition:transform .12s ease, box-shadow .12s ease, opacity .12s ease;
    }

    .btn:hover{
      transform:translateY(-1px);
      box-shadow:0 8px 16px rgba(0,0,0,.06);
    }

    .btn-main{
      background:var(--gold);
      color:#000;
    }

    .btn-secondary{
      background:#edf0f3;
      color:var(--pbz);
    }

    .btn-danger{
      background:#fff;
      color:var(--danger);
      border:1px solid #f2c7c2;
    }

    .empty,
    .error,
    .loading{
      background:#fff;
      border:1px solid var(--border);
      border-radius:14px;
      padding:18px;
      text-align:center;
      color:var(--muted);
    }

    .error{
      color:#a52f2f;
      background:#fdeeee;
      border-color:#f4c3c3;
    }

    @media (max-width:640px){
      h1{font-size:26px}
      .topbar{
        align-items:stretch;
      }
      .topbar-actions{
        width:100%;
      }
      .topbar-actions .btn{
        flex:1;
        text-align:center;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div>
        <h1>Available Jobs</h1>
        <div class="subtitle">
          Browse homeowner projects that match your trade and location.
        </div>
      </div>

      <div class="topbar-actions">
        <a id="dashboardLink" class="btn btn-secondary" href="/pro-dashboard.html">Dashboard</a>
        <a class="btn btn-secondary" href="/pros.html">Back to Pro Signup</a>
        <button id="logoutBtn" class="btn btn-danger" type="button">Logout</button>
      </div>
    </div>

    <div class="filters" id="filters"></div>

    <div id="statusBox" class="loading">Loading jobs...</div>
    <div id="jobsBox" class="jobs-grid" style="display:none;"></div>
  </div>

  <script>
    const SUPABASE_URL = "https://ekegbmhmgwxjqedkglvg.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_2bnkkC7qhGd1bSQ2VTEbZA_EgdZFaX_";

    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const params = new URLSearchParams(window.location.search);

    const filtersEl = document.getElementById("filters");
    const statusBox = document.getElementById("statusBox");
    const jobsBox = document.getElementById("jobsBox");
    const logoutBtn = document.getElementById("logoutBtn");
    const dashboardLink = document.getElementById("dashboardLink");

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function shortText(text, max = 180) {
      const value = String(text || "").trim();
      if (!value) return "No description provided.";
      return value.length > max ? value.slice(0, max).trim() + "..." : value;
    }

    function normalizeValue(value) {
      return String(value || "").trim();
    }

    function getStoredPro() {
      try {
        const raw = localStorage.getItem("pbz_user");
        if (!raw) return null;

        const parsed = JSON.parse(raw);
        if (!parsed || typeof parsed !== "object") return null;

        return parsed;
      } catch (err) {
        console.warn("Could not parse pbz_user:", err);
        return null;
      }
    }

    function resolveFilters() {
      const stored = getStoredPro();

      return {
        category: normalizeValue(params.get("category") || (stored && stored.category) || ""),
        city: normalizeValue(params.get("city") || (stored && stored.city) || ""),
        state: normalizeValue(params.get("state") || (stored && stored.state) || "")
      };
    }

    const storedPro = getStoredPro();
    const activeFilters = resolveFilters();

    function renderFilters() {
      const pills = [];

      if (activeFilters.category) {
        pills.push(`<div class="pill">Category: ${escapeHtml(activeFilters.category)}</div>`);
      }
      if (activeFilters.city) {
        pills.push(`<div class="pill">City: ${escapeHtml(activeFilters.city)}</div>`);
      }
      if (activeFilters.state) {
        pills.push(`<div class="pill">State: ${escapeHtml(activeFilters.state)}</div>`);
      }

      if (!pills.length) {
        pills.push(`<div class="pill">Showing all available jobs</div>`);
      }

      filtersEl.innerHTML = pills.join("");
    }

    function buildJobDetailsUrl(job) {
      const internalId = String(job.id || "").trim();
      const publicId = String(job.public_id || "").trim();

      const url = new URL("/job.html", window.location.origin);

      if (internalId) {
        url.searchParams.set("id", internalId);
      }

      if (publicId) {
        url.searchParams.set("public_id", publicId);
      }

      return url.pathname + url.search;
    }

    function buildDashboardUrl() {
      return "/pro-dashboard.html";
    }

    function renderJobs(data) {
      jobsBox.innerHTML = data.map((job) => {
        const title =
          job.title ||
          job.project_title ||
          "Untitled job";

        const summary =
          job.summary ||
          job.short_summary ||
          job.description ||
          "";

        const location = [job.city, job.state].filter(Boolean).join(", ");

        const postedLabel =
          job.created_at
            ? new Date(job.created_at).toLocaleDateString("en-US", {
                year: "numeric",
                month: "short",
                day: "numeric"
              })
            : "";

        return `
          <div class="job-card">
            <h3 class="job-title">${escapeHtml(title)}</h3>

            <div class="meta">
              <div><strong>Category:</strong> ${escapeHtml(job.category || "-")}</div>
              <div><strong>Location:</strong> ${escapeHtml(location || "-")}</div>
              <div><strong>Posted:</strong> ${escapeHtml(postedLabel || "Recently")}</div>
            </div>

            <div class="desc">${escapeHtml(shortText(summary))}</div>

            <div class="actions">
              <a class="btn btn-main" href="${buildJobDetailsUrl(job)}">View Details</a>
            </div>
          </div>
        `;
      }).join("");
    }

    async function loadJobs() {
      renderFilters();

      try {
        let query = client
          .from("homeowner_jobs")
          .select(`
            id,
            public_id,
            category,
            title,
            project_title,
            summary,
            short_summary,
            description,
            city,
            state,
            created_at
          `)
          .order("created_at", { ascending: false })
          .limit(30);

        if (activeFilters.category) {
          query = query.eq("category", activeFilters.category);
        }

        if (activeFilters.city) {
          query = query.ilike("city", activeFilters.city);
        }

        if (activeFilters.state) {
          query = query.ilike("state", activeFilters.state);
        }

        const { data, error } = await query;

        if (error) {
          throw error;
        }

        const jobs = Array.isArray(data) ? data : [];

        if (!jobs.length) {
          statusBox.className = "empty";
          statusBox.textContent = "No jobs found for this area and category yet.";
          return;
        }

        statusBox.style.display = "none";
        jobsBox.style.display = "grid";
        renderJobs(jobs);
      } catch (error) {
        console.error("Jobs load error:", error);
        statusBox.className = "error";
        statusBox.textContent = "Could not load jobs right now.";
      }
    }

    function handleLogout() {
      try {
        localStorage.removeItem("pbz_user");
      } catch (_) {}

      window.location.href = "/pros.html";
    }

    function bootSessionLinks() {
      if (dashboardLink) {
        dashboardLink.href = buildDashboardUrl();
      }
    }

    function guardSession() {
      if (!storedPro) {
        statusBox.className = "error";
        statusBox.textContent = "No active Pro session found. Please return to Pro signup.";
        jobsBox.style.display = "none";
        return false;
      }
      return true;
    }

    if (logoutBtn) {
      logoutBtn.addEventListener("click", handleLogout);
    }

    bootSessionLinks();

    if (guardSession()) {
      loadJobs();
    }
  </script>
</body>
</html>
