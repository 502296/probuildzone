<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ProBuildZone — Homeowner</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --brand:#0f2a43;
      --bg:#f6f7fb;
      --card:#fff;
      --ok:#0a7f4f;
      --err:#b00020;
      --muted:#6b7a8c;
      --gold:#D4AF37;
      --border:#d7dde6;
    }

    * { box-sizing: border-box; }

    body {
      font-family:"Inter",system-ui,-apple-system,Segoe UI,sans-serif;
      background:var(--bg);
      color:var(--brand);
      margin:0;
      padding:40px 16px;
    }

    .page {
      max-width: 720px;
      margin: 0 auto;
    }

    h1 {
      text-align:center;
      margin:0 0 12px;
    }

    .subhead {
      text-align:center;
      color:var(--muted);
      line-height:1.6;
      max-width:640px;
      margin:0 auto 22px;
    }

    .card {
      max-width:560px;
      margin:24px auto;
      background:var(--card);
      padding:24px;
      border-radius:12px;
      box-shadow:0 6px 20px rgba(0,0,0,.08);
    }

    .mode-badge {
      display:none;
      margin:0 auto 14px;
      text-align:center;
      font-weight:700;
      color:#23406a;
      background:#eef4ff;
      border:1px solid #d7e5ff;
      border-radius:999px;
      padding:10px 14px;
      max-width:320px;
    }

    label {
      display:block;
      font-weight:600;
      font-size:.92rem;
      margin:12px 0 6px;
    }

    input, textarea, select {
      width:100%;
      padding:12px;
      border:1px solid var(--border);
      border-radius:8px;
      font-size:1rem;
      background:#fff;
    }

    textarea {
      resize:vertical;
      min-height:120px;
    }

    .row {
      display:flex;
      gap:12px;
    }

    .row > div {
      flex:1;
    }

    button,
    .action-link {
      width:100%;
      margin-top:16px;
      padding:14px 16px;
      border:0;
      border-radius:10px;
      background:#0b7ef4;
      color:#fff;
      font-weight:700;
      cursor:pointer;
      transition:.2s;
      text-decoration:none;
      display:inline-block;
      text-align:center;
    }

    button:hover,
    .action-link:hover {
      filter:brightness(.95);
    }

    button[disabled] {
      opacity:.6;
      cursor:not-allowed;
    }

    .secondary-link {
      background:#edf0f3;
      color:var(--brand);
    }

    .dashboard-link {
      background:var(--gold);
      color:#000;
    }

    .msg {
      margin-top:12px;
      text-align:center;
      line-height:1.6;
    }

    .msg.ok {
      color:var(--ok);
      font-weight:600;
    }

    .msg.err {
      color:var(--err);
      font-weight:600;
    }

    .muted {
      color:var(--muted);
      display:block;
      margin-top:4px;
    }

    .success-panel {
      display:none;
      margin-top:18px;
      border:1px solid #bbf7d0;
      background:#ecfdf3;
      border-radius:12px;
      padding:16px;
    }

    .success-title {
      font-weight:700;
      color:var(--ok);
      margin-bottom:8px;
    }

    .success-actions {
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }

    .success-actions .action-link {
      margin-top:0;
      width:auto;
      flex:1;
      min-width:220px;
    }

    @media (max-width:640px) {
      .row {
        flex-direction:column;
      }

      .success-actions {
        flex-direction:column;
      }

      .success-actions .action-link {
        width:100%;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <h1 id="pageTitle">🏡 Post Your Project</h1>
    <p id="pageSubhead" class="subhead">
      Describe your project clearly so qualified local builders can discover it and request a connection through ProBuildZone.
    </p>

    <div class="card">
      <div id="modeBadge" class="mode-badge">Edit Mode</div>

      <form id="job-form" novalidate>
        <label for="category">Project category *</label>
        <select id="category" required>
          <option value="">Select a category</option>
          <option value="Roofing">Roofing</option>
          <option value="Plumbing">Plumbing</option>
          <option value="Electrical">Electrical</option>
          <option value="HVAC">HVAC</option>
          <option value="Painting">Painting</option>
          <option value="Flooring">Flooring</option>
          <option value="Kitchen Remodeling">Kitchen Remodeling</option>
          <option value="Bathroom Remodeling">Bathroom Remodeling</option>
          <option value="General Contractor">General Contractor</option>
          <option value="Landscaping">Landscaping</option>
          <option value="Concrete">Concrete</option>
          <option value="Siding">Siding</option>
          <option value="Windows & Doors">Windows & Doors</option>
          <option value="Decks & Porches">Decks & Porches</option>
          <option value="Other">Other</option>
        </select>

        <label for="title">Project title *</label>
        <input id="title" type="text" required placeholder="e.g., Repair porch roof">

        <label for="summary">Short summary (optional)</label>
        <input id="summary" type="text" placeholder="One-line summary">

        <div class="row">
          <div>
            <label for="city">City (optional)</label>
            <input id="city" type="text" placeholder="City">
          </div>
          <div>
            <label for="state">State (optional)</label>
            <input id="state" type="text" placeholder="KY">
          </div>
        </div>

        <label for="name">Full name *</label>
        <input id="name" type="text" required placeholder="Your full name">

        <div class="row">
          <div>
            <label for="email">Email *</label>
            <input id="email" type="email" required placeholder="name@example.com">
          </div>
          <div>
            <label for="phone">Phone *</label>
            <input id="phone" type="tel" required placeholder="(555) 555-5555">
          </div>
        </div>

        <label for="address">Full address *</label>
        <input id="address" type="text" required placeholder="Street, City, State, ZIP">

        <label for="description">Full description *</label>
        <textarea id="description" required placeholder="Describe your project, measurements, timeline, etc."></textarea>

        <small class="muted">Fields marked * are required.</small>

        <button id="postBtn" type="submit">🚀 Post Job</button>
        <div id="status" class="msg" aria-live="polite"></div>
      </form>

      <div id="successPanel" class="success-panel">
        <div class="success-title" id="successTitle">Project posted successfully.</div>
        <div id="successDetails" class="muted"></div>

        <div class="success-actions">
          <a id="dashboardLink" class="action-link dashboard-link" href="/homeowner-dashboard.html">View Homeowner Dashboard</a>
          <a id="postAnotherLink" class="action-link secondary-link" href="#">Post Another Job</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById("job-form");
    const btn = document.getElementById("postBtn");
    const statusEl = document.getElementById("status");
    const successPanel = document.getElementById("successPanel");
    const successTitle = document.getElementById("successTitle");
    const successDetails = document.getElementById("successDetails");
    const dashboardLink = document.getElementById("dashboardLink");
    const postAnotherLink = document.getElementById("postAnotherLink");
    const pageTitle = document.getElementById("pageTitle");
    const pageSubhead = document.getElementById("pageSubhead");
    const modeBadge = document.getElementById("modeBadge");

    const params = new URLSearchParams(window.location.search);
    const editId = (params.get("edit_id") || params.get("id") || "").trim();
    const editPublicId = (params.get("public_id") || "").trim();
    const isEditMode = !!(editId || editPublicId);

    function setStatus(text, type) {
      statusEl.textContent = text || "";
      statusEl.className = "msg " + (type || "");
    }

    function hideSuccessPanel() {
      successPanel.style.display = "none";
      successDetails.textContent = "";
    }

    function showSuccessPanel(title, message) {
      successTitle.textContent = title || "Success";
      successDetails.textContent = message || "";
      successPanel.style.display = "block";
    }

    function getStoredHomeowner() {
      try {
        const raw = localStorage.getItem("pbz_homeowner");
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        return parsed && typeof parsed === "object" ? parsed : null;
      } catch (err) {
        console.warn("Could not parse pbz_homeowner:", err);
        return null;
      }
    }

    function buildHomeownerSession(payload, responseData) {
      const job = responseData && responseData.job ? responseData.job : {};
      const homeowner = responseData && responseData.homeowner ? responseData.homeowner : {};

      return {
        name: homeowner.name || payload.name || "",
        email: (homeowner.email || payload.email || "").toLowerCase(),
        phone: homeowner.phone || payload.phone || "",
        last_job_public_id: job.public_id || responseData.public_id || "",
        last_job_id: job.id || responseData.job_id || "",
        last_job_title: job.title || payload.title || "",
        last_job_category: job.category || payload.category || "",
        saved_at: new Date().toISOString()
      };
    }

    function saveHomeownerSession(sessionData) {
      try {
        localStorage.setItem("pbz_homeowner", JSON.stringify(sessionData));
      } catch (err) {
        console.warn("Could not save pbz_homeowner:", err);
      }
    }

    function resetForAnotherPost() {
      hideSuccessPanel();
      setStatus("", "");
      form.reset();
      form.style.display = "block";
      btn.disabled = false;
      btn.textContent = "🚀 Post Job";
      pageTitle.textContent = "🏡 Post Your Project";
      pageSubhead.textContent = "Describe your project clearly so qualified local builders can discover it and request a connection through ProBuildZone.";
      modeBadge.style.display = "none";
      window.history.replaceState({}, "", "/homeowner.html");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function populateForm(job) {
      document.getElementById("category").value = job.category || "";
      document.getElementById("title").value = job.title || job.project_title || "";
      document.getElementById("summary").value = job.summary || "";
      document.getElementById("city").value = job.city || "";
      document.getElementById("state").value = job.state || "";
      document.getElementById("name").value = job.name || "";
      document.getElementById("email").value = job.email || "";
      document.getElementById("phone").value = job.phone || "";
      document.getElementById("address").value = job.address || job.full_address || "";
      document.getElementById("description").value =
        job.description || job.full_description || job.details || "";
    }

    async function loadJobForEditing() {
      if (!isEditMode) return;

      const homeowner = getStoredHomeowner();
      if (!homeowner || !homeowner.email) {
        setStatus("No active homeowner session found. Please return to your dashboard first.", "err");
        return;
      }

      try {
        const url = new URL("/.netlify/functions/get-job", window.location.origin);
        if (editId) url.searchParams.set("id", editId);
        if (editPublicId) url.searchParams.set("public_id", editPublicId);

        const res = await fetch(url.toString());
        const data = await res.json().catch(() => ({}));

        if (!res.ok || !data.ok || !data.job) {
          throw new Error(data.error || "Could not load this project for editing");
        }

        populateForm(data.job);

        pageTitle.textContent = "✏️ Edit Your Project";
        pageSubhead.textContent = "Update your project details so builders see the latest scope, location, and description.";
        modeBadge.style.display = "block";
        btn.textContent = "💾 Save Changes";
      } catch (err) {
        console.error(err);
        setStatus(err.message || "Could not load project data.", "err");
      }
    }

    postAnotherLink.addEventListener("click", (e) => {
      e.preventDefault();
      resetForAnotherPost();
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      hideSuccessPanel();
      setStatus("", "");

      const homeowner = getStoredHomeowner();

      const payload = {
        category: document.getElementById("category").value.trim(),
        title: document.getElementById("title").value.trim(),
        summary: document.getElementById("summary").value.trim() || null,
        city: document.getElementById("city").value.trim() || null,
        state: document.getElementById("state").value.trim() || null,
        name: document.getElementById("name").value.trim(),
        email: document.getElementById("email").value.trim(),
        phone: document.getElementById("phone").value.trim(),
        address: document.getElementById("address").value.trim(),
        description: document.getElementById("description").value.trim(),
      };

      if (!payload.category || !payload.title || !payload.name || !payload.email || !payload.phone || !payload.address || !payload.description) {
        return setStatus("Please fill all required fields.", "err");
      }

      btn.disabled = true;
      btn.textContent = isEditMode ? "Saving changes…" : "Saving to database…";
      setStatus("", "");

      try {
        let endpoint = "/.netlify/functions/post-job";
        let requestPayload = { ...payload };

        if (isEditMode) {
          endpoint = "/.netlify/functions/update-job";
          requestPayload = {
            ...payload,
            email: (homeowner && homeowner.email) ? homeowner.email : payload.email,
            job_id: editId || null,
            public_id: editPublicId || null,
          };
        }

        const res = await fetch(endpoint, {
          method: "POST",
          headers: { "Content-Type": "application/json", "Accept": "application/json" },
          body: JSON.stringify(requestPayload)
        });

        const text = await res.text();
        let data;
        try {
          data = JSON.parse(text);
        } catch {
          throw new Error(`Non-JSON response (${res.status}): ${text.slice(0,120)}…`);
        }

        if (!res.ok || !data.ok) {
          throw new Error(data.error || `Failed with ${res.status}`);
        }

        const homeownerSession = buildHomeownerSession(payload, data);
        saveHomeownerSession(homeownerSession);

        if (isEditMode) {
          setStatus(`✅ Project updated successfully!`, "ok");
          showSuccessPanel(
            "Project updated successfully.",
            "Your changes have been saved. You can now return to your homeowner dashboard and continue reviewing builder requests."
          );
        } else {
          setStatus(`✅ Job posted successfully! Public Job ID: ${data.public_id || homeownerSession.last_job_public_id || "Created"}`, "ok");
          showSuccessPanel(
            "Project posted successfully.",
            "Your project has been saved. You can now continue to your homeowner dashboard to review your project and incoming connection requests."
          );
        }

        dashboardLink.href = "/homeowner-dashboard.html";
        form.style.display = "none";
      } catch (err) {
        console.error(err);
        setStatus(`Error: ${err.message}`, "err");
      } finally {
        btn.disabled = false;
        btn.textContent = isEditMode ? "💾 Save Changes" : "🚀 Post Job";
      }
    });

    loadJobForEditing();
  </script>
</body>
</html>
