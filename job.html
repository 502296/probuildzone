<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Job Details — ProBuildZone</title>

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --ink:#0f1720;
      --ink-soft:#5b6574;
      --muted:#6b7280;
      --bg:#f5f5f7;
      --card:#ffffff;
      --border:#e5e7eb;
      --gold:#D4AF37;
      --gold-2:#c49c1f;
      --shadow:0 18px 45px rgba(15, 23, 32, 0.08);
      --radius-xl:26px;
      --radius-lg:20px;
      --radius-md:16px;
      --radius-sm:12px;
      --err:#b00020;
      --danger:#b42318;
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      padding:0;
      background:var(--bg);
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
      color:var(--ink);
    }

    body{
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }

    .wrap{
      max-width:980px;
      margin:28px auto 56px;
      padding:0 16px;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      margin-bottom:22px;
      flex-wrap:wrap;
    }

    .brand{
      font-size:16px;
      font-weight:800;
      letter-spacing:-0.02em;
      color:var(--ink);
    }

    .brand span{
      color:var(--gold);
    }

    .topbar-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn{
      appearance:none;
      border:none;
      cursor:pointer;
      padding:12px 18px;
      border-radius:14px;
      font-weight:700;
      text-decoration:none;
      transition:transform .12s ease, box-shadow .12s ease, background .12s ease, border-color .12s ease;
      text-align:center;
      font-size:14px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }

    .btn:hover{
      transform:translateY(-1px);
      box-shadow:0 10px 20px rgba(15,23,32,0.08);
    }

    .btn.white{
      background:#fff;
      border:1px solid var(--border);
      color:var(--ink);
    }

    .btn.white:hover{
      background:#fafafa;
    }

    .btn.primary{
      background:var(--gold);
      color:#111827;
    }

    .btn.primary:hover{
      background:var(--gold-2);
    }

    .btn.danger{
      background:#fff;
      color:var(--danger);
      border:1px solid #f1d1cd;
    }

    .btn.danger:hover{
      background:#fff8f7;
    }

    .error{
      color:var(--err);
      margin:0 0 14px;
      line-height:1.7;
      font-size:15px;
      text-align:center;
    }

    .loading-box{
      max-width:720px;
      margin:24px auto 0;
      background:#fff;
      border:1px solid var(--border);
      border-radius:20px;
      padding:20px;
      color:var(--muted);
      text-align:center;
      font-size:15px;
      box-shadow:var(--shadow);
    }

    .hero{
      text-align:center;
      margin:10px auto 28px;
      max-width:760px;
    }

    .hero h1{
      margin:0 0 10px;
      font-size:14px;
      font-weight:700;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:var(--muted);
    }

    .hero p{
      margin:0;
      font-size:clamp(32px, 5vw, 54px);
      line-height:1.08;
      letter-spacing:-0.04em;
      font-weight:800;
      color:var(--ink);
    }

    .main-card{
      max-width:720px;
      margin:0 auto;
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius-xl);
      box-shadow:var(--shadow);
      padding:24px;
    }

    .job-card{
      border:1px solid var(--border);
      border-radius:22px;
      padding:24px;
      background:#fff;
    }

    .job-top{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
      align-items:start;
      margin-bottom:18px;
    }

    .job-title{
      margin:0 0 8px;
      font-size:22px;
      line-height:1.15;
      letter-spacing:-0.02em;
      font-weight:800;
      color:var(--ink);
    }

    .job-meta{
      margin:0;
      color:var(--ink-soft);
      font-size:15px;
      line-height:1.7;
      font-weight:500;
    }

    .job-side{
      text-align:right;
      color:var(--ink-soft);
      font-size:15px;
      line-height:1.8;
      font-weight:500;
    }

    .job-side strong{
      color:var(--ink);
      font-weight:700;
    }

    .main-action{
      margin:8px 0 22px;
    }

    .main-action .btn{
      width:100%;
      padding:16px 20px;
      border-radius:16px;
      font-size:17px;
      font-weight:800;
    }

    .summary-box{
      border:1px solid var(--border);
      border-radius:18px;
      padding:18px;
      background:#fcfcfd;
    }

    .summary-box h2{
      margin:0 0 10px;
      font-size:13px;
      font-weight:800;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:var(--muted);
    }

    .summary{
      color:#233548;
      font-size:15px;
      line-height:1.8;
      white-space:pre-wrap;
      margin:0;
    }

    .bottom-actions{
      display:flex;
      gap:10px;
      margin-top:18px;
      flex-wrap:wrap;
    }

    .bottom-actions .btn{
      flex:1;
      min-width:180px;
    }

    #jobContent{
      display:none;
    }

    @media (max-width: 700px){
      .wrap{
        margin:18px auto 40px;
      }

      .topbar{
        align-items:stretch;
      }

      .topbar-actions{
        width:100%;
      }

      .topbar-actions .btn{
        flex:1;
      }

      .main-card{
        padding:18px;
        border-radius:22px;
      }

      .job-card{
        padding:18px;
      }

      .job-top{
        grid-template-columns:1fr;
        gap:8px;
      }

      .job-side{
        text-align:left;
      }

      .bottom-actions{
        flex-direction:column;
      }

      .bottom-actions .btn{
        width:100%;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">ProBuild<span>Zone</span></div>

      <div class="topbar-actions">
        <a id="dashboardLink" class="btn white" href="/pro-dashboard.html">Dashboard</a>
        <button id="logoutBtn" class="btn danger" type="button">Logout</button>
      </div>
    </div>

    <div class="hero">
      <h1>Project Review</h1>
      <p>Review the project and decide if it’s a good fit for you</p>
    </div>

    <div id="jobError" class="error"></div>
    <div id="loadingBox" class="loading-box">Loading job details...</div>

    <div id="jobContent">
      <div class="main-card">
        <div class="job-card">
          <div class="job-top">
            <div>
              <h2 id="v_title" class="job-title">Untitled job</h2>
              <p class="job-meta" id="v_meta_line">—</p>
            </div>

            <div class="job-side">
              <div><strong>Job ID:</strong> <span id="v_id">—</span></div>
              <div><strong>Posted:</strong> <span id="v_posted">—</span></div>
            </div>
          </div>

          <div class="main-action">
            <a id="connectLink" class="btn primary" href="#">Request Connection</a>
          </div>

          <div class="summary-box">
            <h2>Project Summary</h2>
            <p class="summary" id="v_summary">—</p>
          </div>

          <div class="bottom-actions">
            <a id="jobsLink" class="btn white" href="/jobs.html">Back to Matching Jobs</a>
            <a class="btn white" href="/index.html">Back to Home</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    (async () => {
      const params = new URLSearchParams(window.location.search);

      const rawId =
        params.get("id") ||
        params.get("jobId") ||
        params.get("job") ||
        "";

      const rawPublicId =
        params.get("public_id") ||
        params.get("publicId") ||
        "";

      const jobId = rawId.trim();
      const publicId = rawPublicId.trim();

      const jobError = document.getElementById("jobError");
      const loadingBox = document.getElementById("loadingBox");
      const jobContent = document.getElementById("jobContent");

      const v_id = document.getElementById("v_id");
      const v_title = document.getElementById("v_title");
      const v_category = document.getElementById("v_category");
      const v_location = document.getElementById("v_location");
      const v_posted = document.getElementById("v_posted");
      const v_summary = document.getElementById("v_summary");
      const v_meta_line = document.getElementById("v_meta_line");

      const connectLink = document.getElementById("connectLink");
      const jobsLink = document.getElementById("jobsLink");
      const dashboardLink = document.getElementById("dashboardLink");
      const logoutBtn = document.getElementById("logoutBtn");

      function getStoredPro() {
        try {
          const raw = localStorage.getItem("pbz_user");
          if (!raw) return null;
          const parsed = JSON.parse(raw);
          return parsed && typeof parsed === "object" ? parsed : null;
        } catch (err) {
          console.warn("Could not parse pbz_user:", err);
          return null;
        }
      }

      function buildJobsUrl(user) {
        const q = new URLSearchParams({
          category: user?.category || "",
          city: user?.city || "",
          state: user?.state || ""
        });

        return "/jobs.html?" + q.toString();
      }

      function formatDate(value) {
        if (!value) return "Recently";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return "Recently";

        return date.toLocaleDateString("en-US", {
          year: "numeric",
          month: "long",
          day: "numeric"
        });
      }

      function handleLogout() {
        try {
          localStorage.removeItem("pbz_user");
        } catch (_) {}
        window.location.href = "/pros.html";
      }

      function showError(message) {
        loadingBox.style.display = "none";
        jobContent.style.display = "none";
        jobError.textContent = message || "Could not load this job right now.";
      }

      const storedPro = getStoredPro();

      if (dashboardLink) {
        dashboardLink.href = "/pro-dashboard.html";
      }

      if (logoutBtn) {
        logoutBtn.addEventListener("click", handleLogout);
      }

      if (storedPro) {
        jobsLink.href = buildJobsUrl(storedPro);
      }

      if (!storedPro) {
        showError("No active Pro session found. Please return to Pro signup first.");
        return;
      }

      if (!jobId && !publicId) {
        showError("Job not found.");
        return;
      }

      const jobUrl = new URL("/.netlify/functions/get-job", window.location.origin);

      if (publicId) {
        jobUrl.searchParams.set("public_id", publicId);
      } else if (jobId) {
        jobUrl.searchParams.set("id", jobId);
      }

      try {
        const jobRes = await fetch(jobUrl.toString(), {
          headers: { "Accept": "application/json" }
        });

        let jobJson = {};
        try {
          jobJson = await jobRes.json();
        } catch (_) {
          jobJson = {};
        }

        if (!jobRes.ok || !jobJson.ok || !jobJson.job) {
          showError(jobJson.error || "Job not found.");
          return;
        }

        const j = jobJson.job;

        const resolvedId = j.id || jobId || "—";
        const resolvedPublicId = j.public_id || publicId || "";

        const title =
          j.project_title ||
          j.title ||
          j.category ||
          "Untitled job";

        const category =
          j.category ||
          "—";

        const location =
          [j.city, j.state].filter(Boolean).join(", ") ||
          j.full_address ||
          "—";

        const summary =
          j.short_summary ||
          j.full_description ||
          j.description ||
          "No project description provided yet.";

        v_id.textContent = resolvedPublicId || resolvedId;
        v_title.textContent = title;
        v_posted.textContent = formatDate(j.created_at);
        v_summary.textContent = summary;
        v_meta_line.textContent = [location, category].filter(Boolean).join(" • ");

        const messageUrl = new URL("/pro-offer.html", window.location.origin);

        if (resolvedId && resolvedId !== "—") {
          messageUrl.searchParams.set("id", resolvedId);
        }

        if (resolvedPublicId) {
          messageUrl.searchParams.set("public_id", resolvedPublicId);
        }

        connectLink.href = messageUrl.pathname + messageUrl.search;

        loadingBox.style.display = "none";
        jobContent.style.display = "block";
      } catch (err) {
        console.error("job.html load error:", err);
        showError("Could not load this job right now.");
      }
    })();
  </script>
</body>
</html>
