<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>ProBuildZone — Start Free Trial</title>

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <script>
    const PBZ_CANONICAL_CATEGORIES = [
      "General Construction",
      "Remodeling",
      "Plumbing",
      "Electrical",
      "HVAC",
      "Roofing",
      "Flooring",
      "Painting",
      "Drywall",
      "Landscaping",
      "Cleaning",
      "Moving",
      "Handyman",
      "Concrete",
      "Fencing",
      "Windows & Doors",
      "Kitchen Remodeling",
      "Bathroom Remodeling"
    ];

    function normalizePbzCategory(value) {
      const raw = String(value || "").trim();
      if (!raw) return "";

      const exact = PBZ_CANONICAL_CATEGORIES.find(
        (item) => item.toLowerCase() === raw.toLowerCase()
      );
      if (exact) return exact;

      const aliases = {
        "general contractor": "General Construction",
        "general contracting": "General Construction",
        "contractor": "General Construction",
        "roof": "Roofing",
        "roof repair": "Roofing",
        "plumber": "Plumbing",
        "electrician": "Electrical",
        "electrical work": "Electrical",
        "heating & cooling": "HVAC",
        "painting interior": "Painting",
        "painting exterior": "Painting",
        "floor": "Flooring",
        "bath remodel": "Bathroom Remodeling",
        "bathroom remodel": "Bathroom Remodeling",
        "kitchen remodel": "Kitchen Remodeling",
        "window and doors": "Windows & Doors",
        "windows and doors": "Windows & Doors",
        "windows doors": "Windows & Doors",
        "decks": "General Construction",
        "porches": "General Construction"
      };

      const alias = aliases[raw.toLowerCase()];
      return alias || raw;
    }

    (function () {
      try {
        const raw = localStorage.getItem("pbz_user");
        if (!raw) return;

        const user = JSON.parse(raw);
        const category = normalizePbzCategory(user.category || "");
        const city = (user.city || "").trim();
        const state = (user.state || "").trim();

        if (!category || !city || !state) return;

        if (category !== (user.category || "")) {
          user.category = category;
          localStorage.setItem("pbz_user", JSON.stringify(user));
        }

        const params = new URLSearchParams({
          category,
          city,
          state
        });

        window.location.replace("/jobs.html?" + params.toString());
      } catch (err) {
        console.warn("PBZ auto-redirect skipped:", err);
      }
    })();
  </script>

  <style>
    :root{
      --pbz:#0F2A43;
      --gold:#D4AF37;
      --muted:#617186;
      --bg:#f3f5f7;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
      background:var(--bg);
      color:var(--pbz);
    }
    .page{
      max-width:820px;
      margin:28px auto 40px;
      padding:0 14px;
    }
    h1{
      margin-bottom:16px;
      font-size:26px;
    }
    .card{
      background:#fff;
      border:1px solid #e3e7eb;
      border-radius:16px;
      padding:18px 16px 20px;
      box-shadow:0 6px 22px rgba(0,0,0,.03);
    }
    label{
      display:block;
      font-weight:600;
      margin-bottom:6px;
    }
    input,select,textarea{
      width:100%;
      padding:12px;
      border:1px solid #d5d9de;
      border-radius:10px;
      font:inherit;
      background:#fff;
    }
    textarea{
      min-height:110px;
      resize:vertical;
    }
    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
      gap:14px;
    }
    .actions{
      margin-top:18px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    button{
      border:none;
      cursor:pointer;
      font-weight:600;
      font-family:inherit;
    }
    .btn-main{
      background:var(--gold);
      color:#000;
      padding:12px 16px;
      border-radius:10px;
    }
    .btn-secondary{
      background:#edf0f3;
      color:var(--pbz);
      padding:12px 16px;
      border-radius:10px;
    }
    .alert{
      margin-top:12px;
      background:#fdeeee;
      border:1px solid #f4c3c3;
      border-radius:10px;
      padding:10px 12px;
      color:#a52f2f;
      display:none;
      white-space:pre-wrap;
    }
    .hint{
      color:var(--muted);
      font-size:13px;
      margin-top:6px;
      line-height:1.45;
    }

    @media (max-width:540px){
      .card{
        padding:16px 14px 20px;
      }
      .actions{
        flex-direction:column;
      }
      .btn-main,.btn-secondary{
        width:100%;
        text-align:center;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <h1>ProBuildZone — Start Free Trial</h1>

    <div class="card">
      <form id="prosForm" novalidate autocomplete="off">

        <div class="grid">
          <div>
            <label for="name">Business / Owner name *</label>
            <input id="name" name="name" required>
          </div>

          <div>
            <label for="email">Email *</label>
            <input id="email" name="email" type="email" required>
          </div>

          <div>
            <label for="phone">Phone *</label>
            <input id="phone" name="phone" required>
          </div>

          <div>
            <label for="address">Business address</label>
            <input id="address" name="address">
          </div>

          <div>
            <label for="license">Business license *</label>
            <input id="license" name="license" required>
          </div>

          <div>
            <label for="insurance">Insurance</label>
            <input id="insurance" name="insurance" placeholder="Optional">
          </div>

          <div>
            <label for="category">Category *</label>
            <select id="category" name="category" required>
              <option value="">Select</option>
              <option value="General Construction">General Construction</option>
              <option value="Remodeling">Remodeling</option>
              <option value="Plumbing">Plumbing</option>
              <option value="Electrical">Electrical</option>
              <option value="HVAC">HVAC</option>
              <option value="Roofing">Roofing</option>
              <option value="Flooring">Flooring</option>
              <option value="Painting">Painting</option>
              <option value="Drywall">Drywall</option>
              <option value="Landscaping">Landscaping</option>
              <option value="Cleaning">Cleaning</option>
              <option value="Moving">Moving</option>
              <option value="Handyman">Handyman</option>
              <option value="Concrete">Concrete</option>
              <option value="Fencing">Fencing</option>
              <option value="Windows & Doors">Windows & Doors</option>
              <option value="Kitchen Remodeling">Kitchen Remodeling</option>
              <option value="Bathroom Remodeling">Bathroom Remodeling</option>
            </select>
          </div>

          <div>
            <label for="city">City *</label>
            <input id="city" name="city" required placeholder="Louisville">
          </div>

          <div>
            <label for="state">State *</label>
            <input id="state" name="state" required placeholder="KY">
          </div>

          <div style="grid-column:1/-1">
            <label for="notes">Services & Notes</label>
            <textarea id="notes" name="notes" placeholder="Tell homeowners what kind of work you do best."></textarea>
            <div class="hint">
              Your profile will be saved directly in ProBuildZone for matching and onboarding.
            </div>
          </div>
        </div>

        <div id="alert" class="alert"></div>

        <div class="actions">
          <button type="reset" class="btn-secondary">Reset</button>
          <button id="startBtn" type="submit" class="btn-main">Start Free Trial</button>
        </div>

      </form>
    </div>
  </div>

  <script src="/pros.js"></script>
</body>
</html>
