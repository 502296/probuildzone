<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Request Connection – ProBuildZone</title>

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --ink:#0f1720;
      --ink-soft:#5b6574;
      --muted:#6b7280;
      --bg:#f5f5f7;
      --card:#ffffff;
      --border:#e5e7eb;
      --gold:#D4AF37;
      --gold-2:#c49c1f;
      --danger:#b42318;
      --success:#166534;
      --shadow:0 18px 45px rgba(15, 23, 32, 0.08);
      --radius-xl:26px;
      --radius-lg:20px;
      --radius-md:16px;
      --radius-sm:12px;
    }

    *{ box-sizing:border-box; }

    html, body{
      margin:0;
      padding:0;
      background:var(--bg);
      color:var(--ink);
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
    }

    body{
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }

    .page{
      max-width:980px;
      margin:28px auto 56px;
      padding:0 16px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:14px;
      flex-wrap:wrap;
      margin-bottom:22px;
    }

    .brand{
      font-size:16px;
      font-weight:800;
      letter-spacing:-0.02em;
      color:var(--ink);
    }

    .brand span{
      color:var(--gold);
    }

    .topbar-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn,
    button{
      appearance:none;
      border:none;
      cursor:pointer;
      font-family:inherit;
      font-weight:700;
      text-decoration:none;
      transition:transform .12s ease, box-shadow .12s ease, background .12s ease, border-color .12s ease;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      font-size:14px;
      padding:12px 18px;
      border-radius:14px;
    }

    .btn:hover,
    button:hover{
      transform:translateY(-1px);
      box-shadow:0 10px 20px rgba(15,23,32,0.08);
    }

    .btn-main{
      background:var(--gold);
      color:#111827;
    }

    .btn-main:hover{
      background:var(--gold-2);
    }

    .btn-secondary{
      background:#fff;
      border:1px solid var(--border);
      color:var(--ink);
    }

    .btn-secondary:hover{
      background:#fafafa;
    }

    .btn-danger{
      background:#fff;
      color:var(--danger);
      border:1px solid #f1d1cd;
    }

    .btn-danger:hover{
      background:#fff8f7;
    }

    .hero{
      text-align:center;
      max-width:760px;
      margin:10px auto 28px;
    }

    .hero .eyebrow{
      margin:0 0 10px;
      font-size:14px;
      font-weight:700;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:var(--muted);
    }

    .hero h1{
      margin:0;
      font-size:clamp(32px, 5vw, 54px);
      line-height:1.08;
      letter-spacing:-0.04em;
      font-weight:800;
      color:var(--ink);
    }

    .job-tag{
      margin-top:12px;
      color:var(--ink-soft);
      font-size:15px;
      line-height:1.6;
      font-weight:500;
    }

    .card-wrap{
      max-width:720px;
      margin:0 auto;
    }

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius-xl);
      box-shadow:var(--shadow);
      padding:24px;
    }

    .project-strip{
      border:1px solid var(--border);
      border-radius:18px;
      padding:18px 18px;
      background:#fff;
      margin-bottom:18px;
    }

    .project-strip-title{
      font-size:13px;
      font-weight:800;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:var(--muted);
      margin-bottom:8px;
    }

    .project-strip-value{
      font-size:16px;
      line-height:1.6;
      color:var(--ink);
      font-weight:600;
      word-break:break-word;
    }

    form{
      margin:0;
    }

    .field{
      margin-bottom:14px;
    }

    input,
    textarea{
      width:100%;
      padding:14px 15px;
      border-radius:14px;
      border:1px solid #d5d9de;
      font:inherit;
      background:#fff;
      color:var(--ink);
      transition:border-color .12s ease, box-shadow .12s ease;
    }

    input::placeholder,
    textarea::placeholder{
      color:#8a93a2;
    }

    input:focus,
    textarea:focus{
      outline:none;
      border-color:#aab8c8;
      box-shadow:0 0 0 4px rgba(15, 23, 32, 0.05);
    }

    textarea{
      min-height:130px;
      resize:vertical;
    }

    .alert{
      margin-top:10px;
      border-radius:14px;
      padding:12px 14px;
      font-size:14px;
      display:none;
      white-space:pre-wrap;
      line-height:1.6;
    }

    .alert.error{
      background:#fef2f2;
      border:1px solid #fecaca;
      color:var(--danger);
    }

    .alert.success{
      background:#ecfdf3;
      border:1px solid #bbf7d0;
      color:var(--success);
    }

    .actions{
      margin-top:18px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .actions .btn,
    .actions button{
      flex:1;
      min-width:180px;
    }

    @media (max-width:700px){
      .page{
        margin:18px auto 40px;
      }

      .topbar{
        align-items:stretch;
      }

      .topbar-actions{
        width:100%;
      }

      .topbar-actions .btn,
      .topbar-actions button{
        flex:1;
      }

      .card{
        padding:18px;
        border-radius:22px;
      }

      .actions{
        flex-direction:column;
      }

      .actions .btn,
      .actions button{
        width:100%;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="brand">ProBuild<span>Zone</span></div>

      <div class="topbar-actions">
        <a id="dashboardLink" class="btn btn-secondary" href="/pro-dashboard.html">Dashboard</a>
        <a id="jobBackLink" class="btn btn-secondary" href="/job.html">Back to Job</a>
        <button id="logoutBtn" class="btn-danger" type="button">Logout</button>
      </div>
    </div>

    <div class="hero">
      <div class="eyebrow">Connection Request</div>
      <h1>Send your request</h1>
      <div id="jobTag" class="job-tag"></div>
    </div>

    <div class="card-wrap">
      <div class="card">
        <div class="project-strip">
          <div class="project-strip-title">Project</div>
          <div class="project-strip-value">Introduce yourself clearly and send a short professional message.</div>
        </div>

        <form id="offerForm" novalidate autocomplete="off">
          <div class="field">
            <input id="business_name" name="business_name" placeholder="Your name or business name" required>
          </div>

          <div class="field">
            <input id="pro_email" name="pro_email" type="email" placeholder="Email" required>
          </div>

          <div class="field">
            <input id="phone" name="phone" placeholder="Phone" required>
          </div>

          <div class="field">
            <textarea id="message" name="message" placeholder="Your message" required></textarea>
          </div>

          <div id="alert" class="alert error"></div>
          <div id="success" class="alert success"></div>

          <div class="actions">
            <button type="button" class="btn btn-secondary" id="cancelBtn">Back</button>
            <button type="submit" class="btn btn-main" id="sendBtn">Send Request</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script>
    function getJobId() {
      try {
        const params = new URLSearchParams(window.location.search);
        return (
          params.get("id") ||
          params.get("job") ||
          params.get("job_id") ||
          ""
        ).trim();
      } catch (e) {
        return "";
      }
    }

    function getStoredPro() {
      try {
        const raw = localStorage.getItem("pbz_user");
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        return parsed && typeof parsed === "object" ? parsed : null;
      } catch (e) {
        return null;
      }
    }

    function buildJobsUrl(user) {
      const q = new URLSearchParams({
        category: user.category || "",
        city: user.city || "",
        state: user.state || ""
      });

      return "/jobs.html?" + q.toString();
    }

    function handleLogout() {
      try {
        localStorage.removeItem("pbz_user");
      } catch (_) {}
      window.location.href = "/pros.html";
    }

    const params = new URLSearchParams(window.location.search);
    const jobId = getJobId();
    const publicId =
      (params.get("public_id") || params.get("publicId") || "").trim();
    const storedPro = getStoredPro();

    const jobTagEl = document.getElementById("jobTag");
    const form = document.getElementById("offerForm");
    const alertBox = document.getElementById("alert");
    const successBox = document.getElementById("success");
    const sendBtn = document.getElementById("sendBtn");
    const cancelBtn = document.getElementById("cancelBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const dashboardLink = document.getElementById("dashboardLink");
    const jobBackLink = document.getElementById("jobBackLink");

    const businessNameInput = document.getElementById("business_name");
    const proEmailInput = document.getElementById("pro_email");
    const phoneInput = document.getElementById("phone");
    const messageInput = document.getElementById("message");

    if (dashboardLink) {
      dashboardLink.href = "/pro-dashboard.html";
    }

    if (logoutBtn) {
      logoutBtn.addEventListener("click", handleLogout);
    }

    if (jobId || publicId) {
      const backUrl = new URL("/job.html", window.location.origin);
      if (jobId) backUrl.searchParams.set("id", jobId);
      if (publicId) backUrl.searchParams.set("public_id", publicId);
      jobBackLink.href = backUrl.pathname + backUrl.search;
      jobTagEl.textContent = "Project " + (publicId || jobId);
    } else {
      jobTagEl.textContent = "Project link missing";
      jobBackLink.href = storedPro ? buildJobsUrl(storedPro) : "/jobs.html";
    }

    if (!storedPro) {
      showError("No active Pro session found. Please return to Pro signup first.");
      form.style.display = "none";
    } else {
      if (!businessNameInput.value && storedPro.name) {
        businessNameInput.value = storedPro.name;
      }
      if (!proEmailInput.value && storedPro.email) {
        proEmailInput.value = storedPro.email;
      }
      if (!phoneInput.value && storedPro.phone) {
        phoneInput.value = storedPro.phone;
      }
      if (!messageInput.value && (storedPro.category || storedPro.city || storedPro.state)) {
        const parts = [];
        if (storedPro.category) parts.push(`We specialize in ${storedPro.category}.`);
        if (storedPro.city || storedPro.state) {
          parts.push(`We are based in ${[storedPro.city, storedPro.state].filter(Boolean).join(", ")}.`);
        }
        parts.push("We would be happy to discuss this project and the next steps.");
        messageInput.value = parts.join(" ");
      }
    }

    function showError(msg) {
      alertBox.textContent = msg;
      alertBox.style.display = "block";
      successBox.style.display = "none";
      successBox.textContent = "";
    }

    function showSuccess(msg) {
      successBox.textContent = msg;
      successBox.style.display = "block";
      alertBox.style.display = "none";
      alertBox.textContent = "";
    }

    function clearMessages() {
      alertBox.style.display = "none";
      successBox.style.display = "none";
      alertBox.textContent = "";
      successBox.textContent = "";
    }

    cancelBtn.addEventListener("click", () => {
      if (jobId || publicId) {
        const backUrl = new URL("/job.html", window.location.origin);
        if (jobId) backUrl.searchParams.set("id", jobId);
        if (publicId) backUrl.searchParams.set("public_id", publicId);
        window.location.href = backUrl.pathname + backUrl.search;
        return;
      }

      if (storedPro) {
        window.location.href = buildJobsUrl(storedPro);
        return;
      }

      window.location.href = "/pros.html";
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      clearMessages();

      if (!storedPro) {
        showError("No active Pro session found. Please return to Pro signup first.");
        return;
      }

      if (!jobId) {
        showError("Job ID is missing. Please go back and open this page from the project details page.");
        return;
      }

      const business_name = businessNameInput.value.trim();
      const pro_email = proEmailInput.value.trim();
      const phone = phoneInput.value.trim();
      const message = messageInput.value.trim();

      if (!business_name || !pro_email || !phone || !message) {
        showError("Please fill business name, email, phone, and your message.");
        return;
      }

      const payload = {
        job_id: jobId,
        business_name,
        pro_email,
        phone,
        message
      };

      sendBtn.disabled = true;
      sendBtn.textContent = "Sending...";

      try {
        const res = await fetch("/.netlify/functions/post-connection-request", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok || !data.ok) {
          console.error("post-connection-request error:", data);
          showError(data.error || "Something went wrong while sending your message. Please try again.");
        } else {
          showSuccess("Your request has been sent successfully.");

          form.reset();

          if (storedPro) {
            if (storedPro.name) businessNameInput.value = storedPro.name;
            if (storedPro.email) proEmailInput.value = storedPro.email;
            if (storedPro.phone) phoneInput.value = storedPro.phone;

            const parts = [];
            if (storedPro.category) parts.push(`We specialize in ${storedPro.category}.`);
            if (storedPro.city || storedPro.state) {
              parts.push(`We are based in ${[storedPro.city, storedPro.state].filter(Boolean).join(", ")}.`);
            }
            parts.push("We would be happy to discuss this project and the next steps.");
            messageInput.value = parts.join(" ");
          }
        }
      } catch (err) {
        console.error(err);
        showError("Network error. Please check your connection and try again.");
      } finally {
        sendBtn.disabled = false;
        sendBtn.textContent = "Send Request";
      }
    });
  </script>
</body>
</html>
